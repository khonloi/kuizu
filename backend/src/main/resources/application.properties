spring.application.name=Kuizu

# 1. Driver and URL
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=kuizu;encrypt=true;trustServerCertificate=true;

# 2. Credentials
spring.datasource.username=sa
spring.datasource.password=KuizuPassword@123

# 3. Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Use the dialect specific to your MSSQL version
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect